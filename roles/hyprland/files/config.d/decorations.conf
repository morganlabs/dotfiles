source = ~/.cache/wal/colors-hyprland.conf
exec-once = ~/Dotfiles/bin/setwall ~/Wallpapers

blurls = overlay

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $color4
    col.inactive_border = $color9

    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 6
    drop_shadow = true
    shadow_range = 10
    shadow_render_power = 1
    col.shadow = rgba(00000040)
    col.shadow_inactive	= rgba(00000026)
    
    blur {
        enabled = true
        size = 8
        passes = 3
    }
}

animations {
    enabled = true

    bezier = curve, 0.04, 0.96, 0.14, 0.99

    animation = windows,        1, 4,   curve,  slide
    animation = windowsOut,     1, 4,   curve,  slide
    animation = border,         0, 10,  default
    animation = workspaces,     1, 3,   curve,  slidevert
}

